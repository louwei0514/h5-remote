name: 🚀 白嫖云端打包 APK

on:
  push:
    branches: [ "main", "master" ] # 当你推送到主分支时自动触发
  workflow_dispatch: # 允许你在 GitHub 网页上点按钮手动触发

jobs:
  build:
    name: 编译 Android APK
    runs-on: ubuntu-latest

    steps:
    - name: 📥 拉取代码
      uses: actions/checkout@v4

    - name: 🟢 配置 Node.js 环境
      uses: actions/setup-node@v4
      with:
        # 🌟 核心修复：将版本升级到 22，满足最新 Capacitor 的胃口
        node-version: '22' 

    - name: ☕ 配置 Java JDK 环境
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' # 编译 Android 必备

    - name: 📦 安装前端依赖并打包
      run: |
        npm install
        npm run build

    - name: 🤖 同步代码到安卓工程
      run: npx cap sync android

    - name: 🔨 授权 Gradle 运行权限
      run: chmod +x ./android/gradlew

    - name: ⚙️ 编译 APK (Debug版)
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: 📤 提取并上传 APK 产物
      uses: actions/upload-artifact@v4
      with:
        name: 全息遥控器-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk